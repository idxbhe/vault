name: Build Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.platform.os-name }}
    strategy:
      matrix:
        platform:
          - os-name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary-name: vault
          - os-name: macOS-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            binary-name: vault
          - os-name: macOS-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            binary-name: vault
          - os-name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary-name: vault.exe

    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          if [ "${{ matrix.platform.os }}" == "windows-latest" ]; then
            7z a ../../../vault-${{ matrix.platform.os-name }}.zip ${{ matrix.platform.binary-name }}
          else
            tar czf ../../../vault-${{ matrix.platform.os-name }}.tar.gz ${{ matrix.platform.binary-name }}
          fi

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vault-${{ matrix.platform.os-name }}.tar.gz
            vault-${{ matrix.platform.os-name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
