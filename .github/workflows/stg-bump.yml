name: Staging Version Bump

on:
  push:
    branches:
      - stg

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install release-plz
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL https://github.com/MarcoIeni/release-plz/releases/latest/download/release-plz-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C ~/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Update version and changelog
        id: update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Run release-plz update to modify Cargo.toml and CHANGELOG.md
          # Added --verbose for better debugging
          release-plz update --verbose
          
          # Check if anything changed
          if [ -n "$(git status --porcelain)" ]; then
            VERSION=$(grep '^version =' Cargo.toml | head -n1 | cut -d '"' -f2)
            git add .
            git commit -m "chore: release v$VERSION"
            git push origin stg
            
            # Create and push tag
            git tag "v$VERSION"
            git push origin "v$VERSION"
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            echo "bumped=false" >> $GITHUB_OUTPUT
            echo "No changes detected by release-plz"
          fi
